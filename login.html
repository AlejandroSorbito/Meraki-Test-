<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meraki System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

    <div class="login-wrapper">
        <div class="login-header">
            <span class="logo-icon">🔵🟡⚪</span>
            <h2><strong>Meraki</strong> Teacher Workload & Burnout Risk Management System</h2>
        </div>

        <form class="login-form" id="loginForm">
            <input type="text" id="username" name="username" placeholder="DepEd Email or Employee ID" required
                autocomplete="username">
            <input type="password" id="password" name="password" placeholder="Password" required
                autocomplete="current-password">

            <select id="role" name="role" required>
                <option value="" disabled selected>Select Access Role</option>
                <option value="teacher">Teacher Portal</option>
                <option value="principal">Principal Dashboard</option>
            </select>

            <button type="submit" class="login-submit-btn">Sign In to Meraki</button>
            <a href="#" class="forgot-password">Need help logging in?</a>
        </form>
    </div>

    <script type="module">
        // 1. Import your Firebase app connection
        import { app } from "./Meraki_Firebase.js";

        // 2. Import the Auth tools from Firebase
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 3. Initialize the Authentication service
        const auth = getAuth(app);

        // 4. Handle the form submission
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Prevents page reload

            // Get the values the user typed
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            // Change the button text so the user knows it's loading
            const submitBtn = document.querySelector('.login-submit-btn');
            submitBtn.textContent = "Authenticating...";

            // 5. Ask Firebase to verify the email and password
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Success! Route based on role selection
                    if (role === 'teacher') {
                        window.location.href = 'dashboard.html';
                    } else if (role === 'principal') {
                        window.location.href = 'principal.html';
                    } else {
                        alert('Please select a valid role.');
                        submitBtn.textContent = "Sign In to Meraki";
                    }
                })
                .catch((error) => {
                    // Failure! Wrong password or user doesn't exist.
                    alert("Login Failed. Please check your credentials.");
                    submitBtn.textContent = "Sign In to Meraki";
                });
        });
    </script>
</body>

</html>
