<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal Dashboard - Meraki</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <header class="navbar">
        <div class="logo-container">
            <span class="logo-icon">🔵🟡⚪</span>
            <h1 class="logo">Meraki</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="login-btn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="principal-main">
        <h2 class="section-title">School Overview</h2>
        <div class="kpi-container">
            <div class="kpi-card total-kpi">
                <span class="kpi-label">Total Teachers:</span>
                <span class="kpi-value">42</span>
            </div>
            <div class="kpi-card high-kpi">
                <span class="kpi-label">High Risk</span>
                <span class="kpi-value text-red">8</span>
            </div>
            <div class="kpi-card moderate-kpi">
                <span class="kpi-label">Moderate Risk</span>
                <span class="kpi-value text-green">15</span>
            </div>
        </div>

        <div class="table-container">
            <table class="teacher-table">
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Teaching Load</th>
                        <th>Admin Roles</th>
                        <th>Risk Level</th>
                    </tr>
                </thead>
                <tbody id="teachersTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading teachers from Firebase...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="heatmap-container">
            <h3 class="heatmap-title">School-wide Burnout Heatmap</h3>
            <div class="heatmap-grid" id="heatmapGrid">
                <!-- Generating sample interactive heatmap boxes -->
                <script>
                    const grid = document.getElementById('heatmapGrid');
                    const colors = [
                        { class: 'green', desc: 'Low Risk' },
                        { class: 'yellow', desc: 'Slight Risk' },
                        { class: 'orange', desc: 'Moderate Risk' },
                        { class: 'red', desc: 'High Risk' },
                        { class: 'gray', desc: 'No Data' }
                    ];

                    // Simple simulated generation of 48 teacher data points
                    for (let i = 1; i <= 48; i++) {
                        // Weighted random to simulate real distribution
                        let rand = Math.random();
                        let colorObj = colors[4]; // Default Gray

                        if (rand < 0.3) colorObj = colors[0]; // 30% Green
                        else if (rand < 0.6) colorObj = colors[1]; // 30% Yellow
                        else if (rand < 0.8) colorObj = colors[2]; // 20% Orange
                        else if (rand < 0.95) colorObj = colors[3]; // 15% Red

                        grid.innerHTML += `<div class="heat-box ${colorObj.class}" data-tooltip="Teacher ${i} - ${colorObj.desc}"></div>`;
                    }
                </script>
            </div>
        </div>

    </main>

    <script type="module">
        import { app } from "./Meraki_Firebase.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                window.location.replace("login.html"); 
            } else {
                try {
                    // Fetch all users with 'role' == 'teacher'
                    const q = query(collection(db, "users"), where("role", "==", "teacher"));
                    const querySnapshot = await getDocs(q);
                    
                    const tbody = document.getElementById("teachersTableBody");
                    tbody.innerHTML = "";
                    
                    let teacherCount = 0;
                    let highRiskCount = 0;
                    let moderateRiskCount = 0;
                    
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        teacherCount++;
                        
                        let riskBadgeClass = "low-risk-bg";
                        const risk = (data.riskLevel || "Low");
                        if(risk.toLowerCase() === "high") { 
                            riskBadgeClass = "high-risk-bg"; 
                            highRiskCount++; 
                        } else if(risk.toLowerCase() === "moderate") { 
                            riskBadgeClass = "moderate-risk-bg"; 
                            moderateRiskCount++; 
                        }
                        
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${data.name || "Unknown Teacher"}</td>
                            <td>${data.teachingLoadCount || (Array.isArray(data.teachingLoad) ? data.teachingLoad.length : 0)}</td>
                            <td>${data.adminRolesCount || (Array.isArray(data.adminRoles) ? data.adminRoles.length : 0)}</td>
                            <td><span class="risk-badge ${riskBadgeClass}">${risk}</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    if (teacherCount === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 1rem;">No teachers found.</td></tr>';
                    }
                    
                    // Update KPI totals
                    document.querySelector(".total-kpi .kpi-value").textContent = teacherCount;
                    document.querySelector(".high-kpi .kpi-value").textContent = highRiskCount;
                    document.querySelector(".moderate-kpi .kpi-value").textContent = moderateRiskCount;
                    
                } catch (error) {
                    console.error("Error fetching teachers data:", error);
                    document.getElementById("teachersTableBody").innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding: 1rem;">Error loading data from Firebase.</td></tr>';
                }
            }
        });
    </script>
</body>

</html>
